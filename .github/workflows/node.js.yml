name: export-sb

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-node@v3
              with:
                  node-version: "18.x"
                  cache: "npm"
            - run: npm install
            - run: npm run export -- --src_env=sb
